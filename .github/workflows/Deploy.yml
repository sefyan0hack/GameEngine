name: Deploy Web Version
on:
  workflow_dispatch:

jobs:
  deploy:
      runs-on: ubuntu-latest
      permissions:
        pages: write
        id-token: write

      environment:
        name: github-pages
        url: ${{ steps.deployment.outputs.page_url }}

      steps:
        - uses: actions/checkout@v6
          with:
            submodules: true

        - name: Install Dependencies
          shell: bash
          run: sudo apt-get install -y libx11-dev libgl-dev

        - name: Setup Pages
          uses: actions/configure-pages@v5

          # Build Release in site/Release
        - name: Build Release
          uses: ./.github/actions/Web-build
          with:
            build_type: "Release"

        - name: Upload to Pages
          uses: actions/upload-pages-artifact@v3
          with:
            path: build/site/Release

          # Build Debug in site/Debug
        - name: Build
          uses: ./.github/actions/Web-build
          with:
            build_type: "Debug"

        - name: Upload to Pages
          uses: actions/upload-pages-artifact@v3
          with:
            path: build/site/Debug

        - name: Deploy to GitHub Pages
          id: deployment
          uses: actions/deploy-pages@v4