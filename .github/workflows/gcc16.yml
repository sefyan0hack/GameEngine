name: GCC 16

on:
  push:
    branches: [ reflection ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false

    runs-on: ubuntu-latest

    container:
      image: ghcr.io/mattkretz/cplusplus-ci/gcc16

    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        shell: bash
        run: |
          apt-get update
          apt-get install -y libx11-dev libgl-dev libgl1-mesa-dev libxi-dev mesa-common-dev xvfb

      - name: Set PATH for cmake-latest
        run: echo /opt/cmake-latest/bin >> $GITHUB_PATH

      - name: Configure CMake
        shell: bash
        run: cmake -S . -B build -G Ninja -DCMAKE_TLS_VERIFY=0 -DWITH_TESTS=ON

      - name: Build
        shell: bash
        run: cmake --build build --parallel

      - name: Test
        shell: bash
        run: ctest --test-dir build --output-on-failure

      - name: Check
        shell: bash
        run: |
          strings ./build/tests/unit/unit_tests | grep GCC | head -5
          echo "---------------------------------------------------"
          strings ./build/tests/unit/unit_tests | grep GLIBCXX | tail -5
          echo "---------------------------------------------------"
          strings ./build/Engine/Launcher | grep GLIBCXX | tail -5

      - name: Run Game
        shell: bash
        timeout-minutes: 1
        run:  xvfb-run --auto-servernum ./build/Engine/Launcher # <- this could run for ever 

      - name: Upload Test Executable on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit_tests
          path: build/tests/unit/unit_tests
          retention-days: 7
